<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7 - Validar campos</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0ff 100%);
            margin: 0;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #333;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(80, 100, 160, 0.15);
        }
        .carinha {
            display: inline-block;
            width: 72px;
            height: 72px;
            line-height: 72px;
            text-align: center;
            font-size: 42px;
            background: linear-gradient(145deg, #dce8ff, #e8f0ff);
            border-radius: 50%;
            margin-bottom: 0.5rem;
            border: 3px solid rgba(100, 130, 200, 0.4);
        }
        h1 { margin: 0 0 0.5rem; font-size: 1.4rem; color: #3a4a6c; }
        p { margin: 0 0 1.25rem; font-size: 0.95rem; line-height: 1.5; color: #555; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.35rem; font-weight: 500; }
        input { width: 100%; padding: 0.6rem 0.75rem; border: 2px solid #c8d4e8; border-radius: 10px; font-size: 1rem; }
        input:focus { outline: none; border-color: #6a8ac8; }
        .erro { font-size: 0.85rem; color: #c44; margin-top: 0.25rem; min-height: 1.2em; }
        .botoes { margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            background: linear-gradient(145deg, #6a8ac8, #5a7ab0);
            color: #fff;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        #resultado { margin-top: 1.25rem; padding: 1rem; background: #f0f5ff; border-radius: 10px; border: 1px solid #d8e4f8; min-height: 48px; }
        code { background: #e0e8ff; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="carinha" aria-hidden="true">&#128270;</div>
        <h1>Exercício 7 – Validar campos</h1>
        <p>Preencha os campos e clique em Validar. Corrija o <code>exercicio7.js</code>: a lógica de <strong>mostrar erro</strong> no span (e limpar o resultado) está repetida em cada validação. Crie uma função <code>mostrarErro(campoId, mensagem)</code> e use em todas.</p>
        <div class="form-group">
            <label>Nome: <input type="text" id="nome" placeholder="Seu nome" /></label>
            <span class="erro" id="erro-nome"></span>
        </div>
        <div class="form-group">
            <label>E-mail: <input type="text" id="email" placeholder="email@exemplo.com" /></label>
            <span class="erro" id="erro-email"></span>
        </div>
        <div class="botoes">
            <button type="button" id="validar">Validar</button>
        </div>
        <p id="resultado"></p>
    </div>
    <script src="exercicio7.js"></script>
    <script>
        document.getElementById('validar').addEventListener('click', function () {
            validarFormulario();
        });
    </script>
</body>
</html>
