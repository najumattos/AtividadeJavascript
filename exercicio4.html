<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4 - Saudação</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #f0e8ff 100%);
            margin: 0;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #333;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(120, 80, 160, 0.15);
        }
        .carinha {
            display: inline-block;
            width: 72px;
            height: 72px;
            line-height: 72px;
            text-align: center;
            font-size: 42px;
            background: linear-gradient(145deg, #ffeef2, #f5e6ff);
            border-radius: 50%;
            margin-bottom: 0.5rem;
            border: 3px solid rgba(180, 140, 220, 0.4);
        }
        h1 { margin: 0 0 0.5rem; font-size: 1.4rem; color: #4a3a5c; }
        p { margin: 0 0 1.25rem; font-size: 0.95rem; line-height: 1.5; color: #555; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input[type="text"] {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 2px solid #e0d4f0;
            border-radius: 10px;
            font-size: 1rem;
        }
        input[type="text"]:focus { outline: none; border-color: #9b7bb8; }
        .botoes { margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        #btnOla { background: linear-gradient(145deg, #b892e8, #9b7bb8); color: #fff; }
        #btnTchau { background: linear-gradient(145deg, #f8b4c4, #e89ab0); color: #fff; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        #resultado {
            margin-top: 1.25rem;
            padding: 1rem;
            background: #faf5ff;
            border-radius: 10px;
            border: 1px solid #e8dcf5;
            font-size: 0.9rem;
            min-height: 60px;
        }
        code { background: #f0e8ff; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="carinha" aria-hidden="true">😊</div>
        <h1>Exercício 4 – Saudação</h1>
        <p>Digite um nome e clique em &ldquo;Dizer olá&rdquo; ou &ldquo;Dizer tchau&rdquo;. Corrija o <code>exercicio4.js</code>: extraia a parte <strong>repetida</strong> (desenhar a borda da mensagem) para uma única função e use essa função nas duas.</p>
        <label>Nome: <input type="text" id="nome" value="Maria" placeholder="Seu nome" /></label>
        <div class="botoes">
            <button type="button" id="btnOla">Dizer olá</button>
            <button type="button" id="btnTchau">Dizer tchau</button>
        </div>
        <pre id="resultado"></pre>
    <script src="exercicio4.js"></script>
    <script>
        function pegarNome() {
            return document.getElementById('nome').value.trim() || 'visitante';
        }
        document.getElementById('btnOla').addEventListener('click', function () {
            document.getElementById('resultado').textContent = dizerOla(pegarNome());
        });
        document.getElementById('btnTchau').addEventListener('click', function () {
            document.getElementById('resultado').textContent = dizerTchau(pegarNome());
        });
    </script>
    </div>
</body>
</html>
